[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "luminary-sdk"
version = "0.1.0"
description = "Python SDK for Luminary LLM Observability Platform"
authors = [
    {name = "Anish Dangol", email = "dangol.anish001@gmail.com"}
]
dependencies = [
    "requests>=2.25.0"
]
requires-python = ">=3.8"
readme = "README.md"

[project.urls]
Homepage = "https://github.com/your-repo/luminary"
Repository = "https://github.com/your-repo/luminary"

[tool.setuptools.packages.find]
where = ["."]
include = ["luminary*"]